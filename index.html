<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Utoplearn Logo Animation</title>
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #060412;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      font-family: system-ui, sans-serif;
    }

    .stage {
      position: relative;
      width: min(80vw, 80vh);
      height: min(80vw, 80vh);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* SVG layer */
    .logo-svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .logo-svg svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* PNG layer */
    .logo-png {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
    }

    .logo-png img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    /* Glow overlay behind the logo */
    .glow {
      position: absolute;
      width: 70%;
      height: 70%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(219, 100, 130, 0.35) 0%, transparent 70%);
      filter: blur(40px);
      opacity: 0;
      pointer-events: none;
    }

    /* Replay control */
    .replay-btn {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: rgba(219, 100, 130, 0.15);
      border: 1px solid rgba(219, 100, 130, 0.4);
      color: #db6482;
      padding: 0.6rem 1.4rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      opacity: 0;
      transition: background 0.2s;
    }

    .replay-btn:hover {
      background: rgba(219, 100, 130, 0.3);
    }
  </style>
</head>

    <!-- PNG logo layer (for crossfade target) -->
    <div class="logo-png">
      <img src="utoplearn-3d-logo-image.png" alt="Utoplearn 3D Logo" />
    </div>
  </div>

  <button class="replay-btn" id="replayBtn">Replay</button>

  <!-- GSAP 3 from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <script>
    // ─── Setup ───────────────────────────────────────────────────────
    const mainShape    = document.getElementById("main-shape");
    const detailPaths  = document.querySelectorAll("#detail-paths path");
    const svgLayer     = document.querySelector(".logo-svg");
    const pngLayer     = document.querySelector(".logo-png");
    const glow         = document.querySelector(".glow");
    const replayBtn    = document.getElementById("replayBtn");

    // Calculate total path length for stroke animation
    const pathLength = mainShape.getTotalLength();

    // ─── Initial state ───────────────────────────────────────────────
    function setInitialState() {
      // Main shape: hide stroke and fill
      gsap.set(mainShape, {
        strokeDasharray: pathLength,
        strokeDashoffset: pathLength,
        fillOpacity: 0,
        strokeOpacity: 0,
      });

      // Detail paths: hidden
      gsap.set(detailPaths, {
        opacity: 0,
        scale: 0.92,
        transformOrigin: "center center",
      });

      // Layers
      gsap.set(svgLayer, { opacity: 1 });
      gsap.set(pngLayer, { opacity: 0, scale: 1.02 });
      gsap.set(glow, { opacity: 0, scale: 0.6 });
      gsap.set(replayBtn, { opacity: 0 });
    }

    // ─── Master Timeline ─────────────────────────────────────────────
    function buildTimeline() {
      const tl = gsap.timeline({
        defaults: { ease: "power2.out" },
        onComplete: () => {
          gsap.to(replayBtn, { opacity: 1, duration: 0.4 });
        },
      });

      // Phase 1: Ambient glow fade-in
      tl.to(glow, {
        opacity: 0.5,
        scale: 0.85,
        duration: 0.8,
        ease: "power1.inOut",
      });

      // Phase 2: Stroke draw-in
      tl.to(mainShape, {
        strokeOpacity: 1,
        duration: 0.3,
        ease: "power1.in",
      }, "<0.2");

      tl.to(mainShape, {
        strokeDashoffset: 0,
        duration: 2.4,
        ease: "power2.inOut",
      }, "<");

      // Phase 3: Fill reveal (starts before stroke finishes)
      tl.to(mainShape, {
        fillOpacity: 1,
        duration: 1.0,
        ease: "power3.inOut",
      }, "-=0.8");

      // Phase 4: Glow pulse with fill
      tl.to(glow, {
        opacity: 0.7,
        scale: 1,
        duration: 0.6,
        ease: "power2.out",
      }, "<");

      tl.to(glow, {
        opacity: 0.3,
        scale: 0.9,
        duration: 0.8,
        ease: "power2.inOut",
      });

      // Phase 5: Detail paths stagger in
      tl.to(detailPaths, {
        opacity: 1,
        scale: 1,
        duration: 0.5,
        stagger: {
          each: 0.06,
          from: "center",
        },
        ease: "back.out(1.4)",
      }, "-=0.6");

      // Phase 6: Brief hold + subtle breathing glow
      tl.to(glow, {
        opacity: 0.6,
        scale: 1.05,
        duration: 0.6,
        ease: "sine.inOut",
      });

      tl.to(glow, {
        opacity: 0.25,
        scale: 0.85,
        duration: 0.6,
        ease: "sine.inOut",
      });

      // Phase 7: Crossfade SVG → PNG
      // Scale up SVG slightly while fading out
      tl.to(svgLayer, {
        opacity: 0,
        scale: 1.03,
        duration: 1.2,
        ease: "power2.inOut",
      });

      // Simultaneously fade in PNG
      tl.to(pngLayer, {
        opacity: 1,
        scale: 1,
        duration: 1.2,
        ease: "power2.inOut",
      }, "<");

      // Glow adapts for PNG
      tl.to(glow, {
        opacity: 0.45,
        scale: 1,
        duration: 1.2,
        ease: "power2.inOut",
      }, "<");

      // Phase 8: Final settle — gentle glow breath on PNG
      tl.to(glow, {
        opacity: 0.2,
        scale: 0.9,
        duration: 1.0,
        ease: "sine.inOut",
      });

      return tl;
    }

    // ─── Run ─────────────────────────────────────────────────────────
    setInitialState();
    let masterTL = buildTimeline();

    replayBtn.addEventListener("click", () => {
      gsap.to(replayBtn, {
        opacity: 0,
        duration: 0.2,
        onComplete: () => {
          setInitialState();
          masterTL.kill();
          masterTL = buildTimeline();
        },
      });
    });
  </script>
</body>
</html>
